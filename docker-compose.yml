# YellowPad On-Prem - Docker Compose Reference
# This shows how the services connect in a simple Docker environment.
# Your job is to translate this into Kubernetes manifests.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: yellowpad
      POSTGRES_USER: yellowpad
      POSTGRES_PASSWORD: yellowpad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yellowpad"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: ./src/api-gateway
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: yellowpad
      DB_USER: yellowpad
      DB_PASSWORD: yellowpad
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      DOCUMENT_PROCESSOR_URL: http://document-processor:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  document-processor:
    build: ./src/document-processor
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: yellowpad
      DB_USER: yellowpad
      DB_PASSWORD: yellowpad
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-ui:
    build: ./src/web-ui
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
  minio-data:
