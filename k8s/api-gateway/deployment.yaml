apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37.0-glibc
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z postgres 5432; do sleep 2; done
              echo "waiting for minio..."
              until nc -z minio 9000; do sleep 2; done
              echo "waiting for redis..."
              until nc -z redis 6379; do sleep 2; done
              echo "deps ready"
      containers:
        - name: api-gateway
          image: yellowpad/api-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: yellowpad-config
            - secretRef:
                name: yellowpad-db
            - secretRef:
                name: yellowpad-minio
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
