apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  labels:
    app.kubernetes.io/name: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-ui
    spec:
      containers:
        - name: web-ui
          image: yellowpad/web-ui:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
